name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prompt index and verify generated artifacts
        run: npm run check:generated

      - name: Verify generated artifacts are committed
        run: git diff --exit-code index.json catalog.md

      - name: Run tests
        run: npm test

      - name: Run deployment smoke checks
        run: npm run smoke
